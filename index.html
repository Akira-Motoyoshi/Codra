<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d1f3c" />
  <title>Codra — Career Strategy Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="enhancements.css" />
  <link rel="stylesheet" href="preparation.css" />
  <link rel="stylesheet" href="readiness.css" />

  <link rel="stylesheet" href="recruitment.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="main-sidebar" aria-label="メインナビゲーション" aria-hidden="false">
      <div class="brand"><span class="brand-mark">C</span><span>Codra</span></div>
      <p class="brand-sub">Career strategy, designed by data.</p>
      <nav class="nav-list">
        <button class="nav-item active" data-view="dashboard"><span>◈</span>ダッシュボード</button>
        <button class="nav-item" data-view="discover"><span>⌕</span>企業を探す</button>
        <button class="nav-item" data-view="saved"><span>♡</span>保存企業・選考</button>
        <button class="nav-item" data-view="documents"><span>▤</span>ES・面接対策</button>
        <button class="nav-item" data-view="profile" data-testid="profile-nav"><span>◎</span>プロフィール分析</button>
      </nav>
      <div class="sidebar-bottom">
        <div class="sidebar-note"><span class="status-dot"></span><div><strong>情報をアップデート</strong><small>週1回の見直しがおすすめ</small></div></div>
        <div class="user-mini"><span class="avatar">YU</span><div><strong>ゆうき</strong><small>プロフィール 72%</small></div><span>•••</span></div>
      </div>
    </aside>
    <main class="main-content">
      <header class="topbar"><button class="mobile-menu" data-testid="mobile-menu" aria-label="メニューを開く" aria-expanded="false" aria-controls="main-sidebar">☰</button><div class="breadcrumb">2026卒 / Career OS</div><div class="top-actions"><button class="icon-btn" aria-label="通知">♧<i></i></button><button class="avatar top-avatar" data-view="profile" aria-label="プロフィールを開く">YU</button></div></header>
      <div id="app" class="page-wrap"></div>
    </main>
  </div>
  <div class="sidebar-overlay" id="sidebar-overlay" data-testid="sidebar-overlay" aria-hidden="true"></div>
  <div id="toast" class="toast" role="status"></div>
  <script src="app.js"></script>
  <script src="recruitment.js"></script>
  <script src="navigation.js"></script>
  <script src="runtime-hooks.js"></script>
</body>
</html>
